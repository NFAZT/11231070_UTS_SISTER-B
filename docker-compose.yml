version: '3.8'

services:
  aggregator:
    build: .
    container_name: aggregator
    ports:
      - "8080:8080"
    environment:
      - AGG_DB_PATH=/data/agg.db
    volumes:
      - ./.data:/data
    networks:
      - app-net

  publisher:
    image: python:3.11-slim
    container_name: publisher
    depends_on:
      - aggregator
    working_dir: /app
    volumes:
      - ./:/app
    command: >
      sh -c "pip install requests && python publisher.py"
    networks:
      - app-net

networks:
  app-net:
    driver: bridge